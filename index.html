<!DOCTYPE html>
<html>
<head>
  <title>Course Recommender</title>

  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      padding: 40px;
    }

    .container {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 400px;
    }

    input, textarea, button {
      width: 100%;
      margin-top: 10px;
      padding: 8px;
    }

    button {
      background: #007bff;
      color: white;
      border: none;
      cursor: pointer;
    }

    .results {
      margin-top: 20px;
    }

    .course {
      background: #e3f2fd;
      padding: 10px;
      margin-top: 10px;
      border-radius: 5px;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>Course Recommender</h2>

    <label>Major:</label>
    <select id="major">
  <option value="">--Select a major--</option>
</select>


    <label>Interests:</label>
    <textarea id="interests" placeholder="e.g. AI, philosophy"></textarea>

    <label>Courses Taken:</label>
    <textarea id="courses" placeholder="Comma separated"></textarea>

    <label>Language: <span id="langVal"></span></label>

<input type="range" id="langSlider" min="0" max="100" value="50">

<label>Arts: <span id="artVal"></span></label>
<input type="range" id="artSlider" min="0" max="100" value="50">

<label>Humanities: <span id="humVal"></span></label>
<input type="range" id="humSlider" min="0" max="100" value="50">

<label>Social Science: <span id="socVal"></span></label>
<input type="range" id="socSlider" min="0" max="100" value="50">

<label>Natural Science: <span id="natVal"></span></label>
<input type="range" id="natSlider" min="0" max="100" value="50">

<label>STEM: <span id="stemVal"></span></label>
<input type="range" id="stemSlider" min="0" max="100" value="50">

    <button onclick="getRecommendations()">Get Recommendations</button>

    <div class="results" id="results"></div>
  </div>

  <script src="script.js"></script>

</body>
</html>
